<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | OpenRise</title>
    <link rel="icon" type="image/png" href="image/favicon.png?v=4">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            padding: 2rem;
        }
        .login-card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .login-card h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }
        .login-card p {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-main);
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }
        .btn-login:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .login-footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .login-footer a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <a href="index.html" style="display: inline-block; margin-bottom: 2rem;">
                <img src="image/logo.png" alt="OpenRise Logo" style="height: 40px;">
            </a>
            <h1>Willkommen zurück</h1>
            <p>Melden Sie sich an, um auf Ihr Dashboard zuzugreifen.</p>
            
            <form>
                <div class="form-group">
                    <label>E-Mail Adresse</label>
                    <input type="email" placeholder="name@firma.de">
                </div>
                <div class="form-group">
                    <label>Passwort</label>
                    <input type="password" placeholder="••••••••">
                </div>
                <button type="submit" class="btn-login">Anmelden</button>
            </form>
            
            <div class="login-footer">
                Noch kein Konto? <a href="contact.html">Kontaktieren Sie uns</a>
            </div>
        </div>
    </div>
    
    <script src="js/script.js"></script>
</body>
</html>
